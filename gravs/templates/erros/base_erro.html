<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ codigo }} · Gravs</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0d0618; --purple:#7c3aed; --purple2:#9f5fff; --cyan:#06b6d4; --text:#f1eeff; --text2:#a89bc2; --text3:#6b5f82; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
    }
    .orb {
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      opacity:0.12;
      pointer-events:none;
    }
    .orb-1 { width:400px;height:400px;background:var(--purple);top:-100px;right:-100px; }
    .orb-2 { width:300px;height:300px;background:var(--cyan);bottom:-80px;left:-80px; }
    .card {
      position:relative;
      background:rgba(19,10,36,0.8);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px;
      padding:48px 40px;
      max-width:420px;
      width:100%;
      backdrop-filter:blur(20px);
    }
    .codigo {
      font-family:'Syne',sans-serif;
      font-size:5rem;
      font-weight:800;
      background:linear-gradient(135deg,var(--purple2),var(--cyan));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      line-height:1;
      margin-bottom:8px;
    }
    .emoji { font-size:2.5rem; margin-bottom:16px; display:block; }
    h1 { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:700; margin-bottom:8px; }
    p { color:var(--text2); font-size:0.9rem; line-height:1.6; margin-bottom:24px; }
    .btn {
      display:inline-flex;align-items:center;gap:8px;
      padding:12px 24px;border-radius:10px;
      background:linear-gradient(135deg,var(--purple),var(--purple2));
      color:white;text-decoration:none;
      font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;
      box-shadow:0 4px 16px rgba(124,58,237,0.4);
      transition:all 0.2s;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(124,58,237,0.5); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="card">
    <span class="emoji">{{ emoji }}</span>
    <div class="codigo">{{ codigo }}</div>
    <h1>{{ titulo }}</h1>
    <p>{{ mensagem }}</p>
    <a href="{{ voltar_url }}" class="btn">{{ voltar_texto }}</a>
  </div>
</body>
</html>
