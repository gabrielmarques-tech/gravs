<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta · Gravs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0618;
      --surface: #130a24;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text:    #f1eeff;
      --text2:   #a89bc2;
      --text3:   #6b5f82;
      --focus:   0 0 0 3px rgba(241,238,255,0.08);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      padding: 16px;
    }
    .auth-card {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-text { font-size: 22px; font-weight: 600; letter-spacing: -0.03em; color: var(--text); }
    h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); margin-bottom: 4px; }
    .auth-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 9px 12px;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid var(--border2);
      border-radius: 8px; color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px; transition: border-color 0.15s, box-shadow 0.15s;
      outline: none; -webkit-appearance: none;
    }
    input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
      border-color: rgba(255,255,255,0.3); box-shadow: var(--focus);
    }
    input::placeholder { color: var(--text3); }
    .hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .forgot-link { display: block; text-align: right; font-size: 12px; color: var(--text3); text-decoration: none; margin-top: 5px; transition: color 0.15s; }
    .forgot-link:hover { color: var(--text2); }
    .btn-submit {
      width: 100%; padding: 10px; margin-top: 8px;
      background: var(--text); border: none; border-radius: 8px;
      color: #0d0618; font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s; letter-spacing: -0.01em;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.99); }
    .contabil-box { border: 0.5px solid var(--border2); border-radius: 8px; padding: 12px 14px; background: rgba(255,255,255,0.03); }
    .contabil-label { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; margin: 0; }
    .contabil-label input[type="checkbox"] { width: 16px; height: 16px; margin-top: 2px; cursor: pointer; accent-color: var(--text); flex-shrink: 0; }
    .contabil-titulo { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .contabil-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
    .auth-footer { text-align: center; font-size: 13px; color: var(--text2); margin-top: 20px; }
    .auth-footer a { color: var(--text); font-weight: 500; text-decoration: none; border-bottom: 0.5px solid var(--border2); }
    .auth-footer a:hover { border-color: var(--text); }
    .flash-list { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
    .flash { padding: 9px 13px; border-radius: 7px; font-size: 13px; display: flex; align-items: center; gap: 7px; }
    .flash-erro    { background: rgba(220,38,38,0.12); border: 0.5px solid rgba(220,38,38,0.25); color: #fca5a5; }
    .flash-sucesso { background: rgba(22,163,74,0.12);  border: 0.5px solid rgba(22,163,74,0.25);  color: #86efac; }
    .flash-info    { background: rgba(37,99,235,0.12);  border: 0.5px solid rgba(37,99,235,0.25);  color: #93c5fd; }
  </style>
</head>
<body>

<div class="auth-card">

    <div class="auth-logo">
    <svg width="36" height="36" viewBox="0 0 28 28" fill="none" aria-hidden="true">
    <path d="M14 4C14 4 22 8.5 22 14C22 18.4183 18.4183 22 14 22C9.58172 22 6 18.4183 6 14C6 11.2 7.4 9.2 9.5 7.8" stroke="#f1eeff" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    <path d="M14 10C14 10 17.5 11.8 17.5 14C17.5 15.933 15.933 17.5 14 17.5C12.067 17.5 10.5 15.933 10.5 14C10.5 12.8 11.1 11.9 12 11.3" stroke="#f1eeff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <circle cx="14" cy="14" r="1.8" fill="#f1eeff"/>
  </svg>
    <span class="logo-text">Gravs</span>
  </div>

  <h1>Criar sua conta</h1>
  <p class="auth-subtitle">Comece a controlar suas finanças agora.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-list">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">✕ {{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.cadastro') }}">

    <div class="form-group">
      <label for="nome">Seu nome</label>
      <input type="text" id="nome" name="nome"
             value="{{ nome|default('') }}"
             placeholder="Como quer ser chamado?" required autofocus />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email"
             value="{{ email|default('') }}"
             placeholder="seu@email.com" required />
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha"
             placeholder="Mínimo 6 caracteres" required />
      <p class="hint">Use pelo menos 6 caracteres</p>
    </div>

    <div class="form-group">
      <div class="contabil-box">
        <label class="contabil-label">
          <input type="checkbox" name="modo_contabil" id="modo_contabil" value="1" />
          <div>
            <div class="contabil-titulo">Modo contábil</div>
            <div class="contabil-desc">Habilita lançamentos em partida dobrada. Para contadores e usuários avançados.</div>
          </div>
        </label>
      </div>
    </div>

    <button type="submit" class="btn-submit">Criar conta</button>

  </form>

  <div class="auth-footer">
    Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a>
  </div>

</div>
</body>
</html>
