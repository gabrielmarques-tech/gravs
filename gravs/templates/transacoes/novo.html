{% extends "base.html" %}

{% block title %}Nova Transação{% endblock %}

{% block scripts %}
<script>
async function carregarContas() {
  try {
    const r = await fetch('/contas/api/listar');
    if (!r.ok) return;
    const data = await r.json();
    const select = document.getElementById('select-conta');
    if (!select) return;

    data.contas.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.icone + ' ' + c.nome;
      select.appendChild(opt);
    });
  } catch(e) { /* silencioso */ }
}

function atualizarLabelConta() {
  const tipo = document.querySelector('input[name="tipo"]:checked')?.value;
  const label = document.getElementById('label-conta');
  if (!label) return;
  label.textContent = tipo === 'receita' ? '💰 Recebido em' : '💸 Pago com';
}

// Atualiza label quando tipo muda
document.querySelectorAll('input[name="tipo"]').forEach(el => {
  el.addEventListener('change', atualizarLabelConta);
});

carregarContas();
atualizarLabelConta();
</script>
{% endblock %}
{% block page_title %}Nova Transação{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto">
  <div class="card fade-up">
    <form method="POST" action="{{ url_for('transacoes.novo') }}">

      <div class="form-group">
        <label class="form-label">Tipo</label>
        <div class="tipo-toggle">
          <input type="radio" name="tipo" id="tipo-despesa" value="despesa" checked />
          <label for="tipo-despesa" class="despesa">💸 Despesa</label>
          <input type="radio" name="tipo" id="tipo-receita" value="receita" />
          <label for="tipo-receita" class="receita">💰 Receita</label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Descrição</label>
        <input type="text" name="descricao" class="form-control"
               value="{{ desc_sugerida }}"
               placeholder="Ex: Aluguel, Supermercado..." required autofocus />
      </div>

      <div class="grid grid-2">
        <div class="form-group">
          <label class="form-label">Valor (R$)</label>
          <input type="text" name="valor" class="form-control"
                 value="{{ valor_sugerido }}"
                 placeholder="0,00" required />
        </div>
        <div class="form-group">
          <label class="form-label">Data</label>
          <input type="date" name="data" class="form-control"
                 value="{{ data_sugerida }}" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select name="categoria_id" class="form-control">
          {% for cat in categorias %}
            <option value="{{ cat.id }}">{{ cat.icone }} {{ cat.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Conta/Cartão -->
      <div class="form-group">
        <label class="form-label" id="label-conta">💸 Pago com</label>
        <select name="conta_id" id="select-conta" class="form-control">
          <option value="">— Selecione (opcional) —</option>
        </select>
        <div style="font-size:0.72rem;color:var(--text3);margin-top:4px">
          <a href="{{ url_for('contas.lista') }}" style="color:var(--purple3)">+ Cadastrar nova conta</a>
        </div>
      </div>

      <div class="d-flex gap-12 mt-8" style="justify-content:flex-end">
        <a href="{{ url_for('transacoes.todas') }}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">Salvar transação</button>
      </div>
    </form>
  </div>

  <!-- Link para parcelado -->
  <div class="text-center mt-16">
    <a href="{{ url_for('transacoes.parcelado') }}" class="btn btn-secondary w-100"
    style="justify-content:center;margin-top:8px">
    💳 Parcelar uma compra em várias vezes
    </a>
  </div>
</div>
{% endblock %}
