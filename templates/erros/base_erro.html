<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ codigo }} · Gravs</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #09060f;
      --surface: #110e1c;
      --border:  rgba(255,255,255,0.08);
      --purple:  #7c3aed;
      --purple2: #8b5cf6;
      --text:    #ede9fe;
      --text2:   #9d8ec4;
      --text3:   #5b5070;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .erro-card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .erro-codigo {
      font-size: 6rem;
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      margin-bottom: 20px;
      /* Gradiente sutil no número */
      background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .erro-titulo {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .erro-descricao {
      font-size: 0.875rem;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      background: rgba(139,92,246,0.12);
      border: 1px solid rgba(139,92,246,0.25);
      border-radius: 8px;
      color: var(--purple2);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .btn-home:hover {
      background: rgba(139,92,246,0.18);
      border-color: rgba(139,92,246,0.4);
    }
    .btn-home:active { transform: scale(0.98); }

    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 36px;
      text-decoration: none;
      color: var(--text2);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .logo-link:hover { color: var(--text); }
    .logo-link img {
      width: 28px; height: 28px;
      border-radius: 7px;
    }
  </style>
</head>
<body>

<div class="erro-card">

  <a href="/" class="logo-link">
    <img src="/static/icon-192.png" alt="Gravs" />
    Gravs
  </a>

  <div class="erro-codigo">{{ codigo }}</div>

  <div class="erro-titulo">{{ titulo }}</div>
  <div class="erro-descricao">{{ descricao }}</div>

  <div class="divider"></div>

  <a href="/" class="btn-home">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
    Voltar ao início
  </a>

</div>

</body>
</html>
